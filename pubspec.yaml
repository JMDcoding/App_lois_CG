name: mobeko
description: "Mobeko - Votre assistant juridique intelligent pour la République du Congo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.1
  firebase_messaging: ^15.2.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.4

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.5

  # UI Components
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8

  # Google AI (Gemini)
  google_generative_ai: any

  # Maps
  google_maps_flutter: ^2.10.1
  geolocator: ^13.0.2

  # Documents
  pdf: ^3.12.0
  printing: ^5.14.2
  image_picker: ^1.1.2

  # Voice
  speech_to_text: ^7.0.0

  # Utils
  intl: any
  url_launcher: ^6.3.1
  share_plus: ^10.0.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  uuid: ^4.5.1

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  freezed: ^3.0.0
  json_serializable: ^6.9.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/icons/
    - assets/data/offline/


